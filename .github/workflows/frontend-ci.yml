name: Frontend CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ListFrontEnd/package-lock.json

      - name: Install dependencies
        working-directory: ListFrontEnd
        run: npm ci

      - name: Build
        working-directory: ListFrontEnd
        run: npm run build -- --configuration production

      - name: Run tests (ChromeHeadlessCI)
        working-directory: ListFrontEnd
        run: npm test -- --watch=false --browsers=ChromeHeadlessCI --no-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: ListFrontEnd/coverage/
