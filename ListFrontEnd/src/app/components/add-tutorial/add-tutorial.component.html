<div class="submit-form mt-3">

  <div *ngIf="!submitted">
    <h4 class="mb-3">Add New Tutorial</h4>
    <form name="add-form">

      <div class="form-group">
        <label for="title">Title <span class="text-danger">*</span></label>
        <input
          type="text"
          class="form-control"
          name="title"
          id="title"
          #titleRef="ngModel"
          required
          [(ngModel)]="tutorial.title"
          placeholder="Enter tutorial title"
        />
        <div class="text-danger small mt-1" *ngIf="titleRef.errors?.['required'] && titleRef.touched">
          Title cannot be blank.
        </div>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <input
          type="text"
          class="form-control"
          name="description"
          id="description"
          [(ngModel)]="tutorial.description"
          placeholder="Enter tutorial description (optional)"
        />
      </div>

      <div class="form-group">
        <label for="name">Author Name <span class="text-danger">*</span></label>
        <input
          type="text"
          class="form-control"
          name="name"
          id="name"
          #nameRef="ngModel"
          required
          [(ngModel)]="tutorial.name"
          placeholder="Enter author name"
        />
        <div class="text-danger small mt-1" *ngIf="nameRef.errors?.['required'] && nameRef.touched">
          Author name cannot be blank.
        </div>
      </div>

      <button
        (click)="saveTutorial()"
        class="btn btn-success"
        [disabled]="titleRef.errors?.['required'] || nameRef.errors?.['required'] || isLoading"
        aria-label="Submit tutorial"
      >
        <span *ngIf="isLoading" class="spinner-border spinner-border-sm mr-1" role="status"></span>
        {{ isLoading ? 'Saving...' : 'Submit' }}
      </button>
    </form>
  </div>

  <div *ngIf="submitted" class="text-center py-4">
    <h4 class="text-success">Tutorial Added!</h4>
    <button class="btn btn-primary mt-2" (click)="newTutorial()">Add Another</button>
  </div>

</div>
